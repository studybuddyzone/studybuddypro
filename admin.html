<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Profile Approvals</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0b0f19;
            --card-bg: rgba(20, 27, 45, 0.7);
            --primary: #38bdf8;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.06) 0px, transparent 50%);
        }

        .admin-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Dashboard Header */
        .dashboard-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .dashboard-header h2 {
            font-size: 28px;
            font-weight: 700;
        }

        .dashboard-header h2 span {
            color: var(--primary);
        }

        .stats-badge {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
        }

        /* Requests List */
        .requests-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .no-requests {
            text-align: center;
            padding: 60px;
            background: var(--card-bg);
            border: 1px dashed var(--border);
            border-radius: 16px;
            color: var(--text-muted);
        }

        .no-requests i {
            font-size: 48px;
            margin-bottom: 15px;
            color: rgba(255,255,255,0.1);
        }

        /* Request Card Item */
        .request-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: center;
            transition: all 0.3s;
        }

        .request-card:hover {
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .student-details h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #fff;
        }

        .student-details p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .student-details p strong {
            color: var(--primary);
        }

        /* Comparison Grid */
        .changes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .change-box {
            font-size: 13px;
        }

        .change-box span {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .old-value { color: #f43f5e; text-decoration: line-through; margin-bottom: 2px; }
        .new-value { color: #10b981; font-weight: 500; }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-approve {
            background: var(--success);
            color: white;
        }
        .btn-approve:hover { background: #059669; transform: translateY(-2px); }

        .btn-reject {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }
        .btn-reject:hover { background: var(--danger); color: white; transform: translateY(-2px); }

        @media (max-width: 768px) {
            .request-card { grid-template-columns: 1fr; }
            .changes-grid { grid-template-columns: 1fr; }
            .action-buttons { width: 100%; justify-content: flex-end; }
        }
    </style>
  <script src="devtools-guard.js"></script>
</head>
<body>

    <div class="admin-container">
        <div class="dashboard-header">
            <h2>Admin <span>Approval Dashboard</span></h2>
            <div class="stats-badge" id="pendingCount">Pending Requests: 0</div>
        </div>

        <div class="requests-list" id="requestsContainer">
            <div class="no-requests">
                <i class="fa-solid fa-folder-open"></i>
                <p>Loading pending profile update requests...</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 🔐 YOUR LIVE FIREBASE CONFIGURATION BOX CONNECTED SUCCESSFULLY
        const firebaseConfig = {
            apiKey: "AIzaSyCZhDPaVY7jv_hXtHdpVqUcGe1hwAxvZmc",
            authDomain: "students-e5183.firebaseapp.com",
            databaseURL: "https://students-e5183-default-rtdb.firebaseio.com",
            projectId: "students-e5183",
            storageBucket: "students-e5183.firebasestorage.app",
            messagingSenderId: "473442117683",
            appId: "1:473442117683:web:f39adc0665317aa95e9b46",
            measurementId: "G-DT4XQLZJW3"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Listen and fetch pending requests live from Firebase Realtime Database
        function fetchPendingRequests() {
            const requestsRef = database.ref('profile_requests');
            
            requestsRef.on('value', (snapshot) => {
                const container = document.getElementById('requestsContainer');
                const countBadge = document.getElementById('pendingCount');
                const data = snapshot.val();

                if (!data) {
                    container.innerHTML = `
                        <div class="no-requests">
                            <i class="fa-solid fa-folder-open"></i>
                            <p>No pending profile update requests found.</p>
                        </div>`;
                    countBadge.innerText = "Pending Requests: 0";
                    return;
                }

                container.innerHTML = "";
                let count = 0;

                for (let prn in data) {
                    let req = data[prn];

                    if (req.status === "pending") {
                        count++;
                        const card = document.createElement('div');
                        card.className = "request-card";
                        card.innerHTML = `
                            <div class="student-details">
                                <h3>${req.name || 'Unknown Student'}</h3>
                                <p>PRN Number: <strong>${prn}</strong></p>
                                
                                <div class="changes-grid">
                                    <div class="change-box">
                                        <span>Email Update</span>
                                        <div class="old-value">${req.oldEmail || '-'}</div>
                                        <div class="new-value">${req.newEmail || '-'}</div>
                                    </div>
                                    <div class="change-box">
                                        <span>Mobile Update</span>
                                        <div class="old-value">${req.oldPhone || '-'}</div>
                                        <div class="new-value">${req.newPhone || '-'}</div>
                                    </div>
                                </div>
                            </div>
                            <div class="action-buttons">
                                <button class="btn btn-reject" onclick="processRequest('${prn}', 'rejected')">
                                    <i class="fa-solid fa-xmark"></i> Reject
                                </button>
                                <button class="btn btn-approve" onclick="processRequest('${prn}', 'approved')">
                                    <i class="fa-solid fa-check"></i> Approve
                                </button>
                            </div>
                        `;
                        container.appendChild(card);
                    }
                }

                countBadge.innerText = `Pending Requests: ${count}`;

                if (count === 0) {
                    container.innerHTML = `
                        <div class="no-requests">
                            <i class="fa-solid fa-folder-open"></i>
                            <p>No pending profile update requests found.</p>
                        </div>`;
                }
            });
        }

        function processRequest(prn, action) {
            if (action === 'approved') {
                database.ref('profile_requests/' + prn).once('value').then((snapshot) => {
                    const reqData = snapshot.val();
                    if (reqData) {
                        database.ref('users/' + prn).update({
                            email: reqData.newEmail,
                            phone: reqData.newPhone
                        }).then(() => {
                            database.ref('profile_requests/' + prn).update({
                                status: 'approved'
                            });
                            alert(`Success! PRN ${prn} profile has been permanently updated.`);
                        });
                    }
                });
            } else if (action === 'rejected') {
                database.ref('profile_requests/' + prn).update({
                    status: 'rejected'
                }).then(() => {
                    alert(`Request for PRN ${prn} has been rejected.`);
                });
            }
        }

        fetchPendingRequests();
    </script>
</body>
</html>
