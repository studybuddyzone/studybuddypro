<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Profile Update | Practical Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 🎨 अल्ट्रा प्रीमियम डार्क ग्लासमोर्फिज्म थीम वेरिएबल्स */
        :root {
            --bg-dark: #070a13;
            --card-bg: rgba(15, 22, 42, 0.7);
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.15);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error-red: #ef4444;
            --success-green: #10b981;
            --glass-shadow: rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.04) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.03) 0px, transparent 50%);
            background-attachment: fixed;
            overflow-x: hidden;
            position: relative;
        }

        /* 👑 ORIGINAL I-26 HANDWRITTEN WATERMARK BACKGROUND */
        body::after {
            content: '';
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 150px;
            height: 150px;
            pointer-events: none;
            opacity: 0.15;
            z-index: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="%2338bdf8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><circle cx="85" cy="45" r="8"/><circle cx="85" cy="45" r="1" fill="%2338bdf8"/><path d="M80,65 C50,75 40,110 80,100 C110,90 85,140 70,170 M82,65 L75,160 M25,140 L180,105 M5,155 L170,125 M75,150 L150,138 M115,70 C130,70 135,90 120,110 C105,125 110,100 125,90"/><circle cx="170" cy="125" r="2" fill="%2338bdf8"/><circle cx="160" cy="133" r="2" fill="%2338bdf8"/><circle cx="150" cy="142" r="2" fill="%2338bdf8"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            filter: drop-shadow(0 0 12px rgba(56, 189, 248, 0.6));
        }

        /* 💎 प्रीमियम ग्लासमोर्फिज्म मास्टर कार्ड */
        .edit-deck-card {
            width: 100%;
            max-width: 560px;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 40px 35px;
            box-shadow: 0 30px 70px var(--glass-shadow);
            position: relative;
            z-index: 1;
        }

        .card-header-block {
            text-align: center;
            margin-bottom: 32px;
        }

        .icon-shield-pulse {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.25);
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .card-header-block h2 {
            font-size: 25px;
            font-weight: 700;
            color: #fff;
        }

        .card-header-block p {
            font-size: 13.5px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .form-scaffold {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .input-group-wrapper {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .input-group-wrapper label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.8px;
        }

        .interactive-input-box {
            position: relative;
        }

        .interactive-input-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        .interactive-input-box input, .interactive-input-box select {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            padding: 14px 16px 14px 46px;
            border-radius: 14px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .interactive-input-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .error-hint-text {
            font-size: 11px;
            color: var(--error-red);
            font-weight: 500;
            margin-top: 4px;
            display: none;
        }

        .btn-submit-request {
            width: 100%;
            background: var(--primary);
            color: #030712;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit-request:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        /* 📋 ग्लासमोर्फिज्म टोस्ट पॉपअप */
        .premium-toast-panel {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border);
            padding: 16px 26px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 99999;
            backdrop-filter: blur(20px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            min-width: 340px;
        }

        .premium-toast-panel.active {
            top: 30px;
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .toast-success-node i { color: var(--success-green); }
        .toast-error-node i { color: var(--error-red); }
        .toast-text-content h4 { color: #fff; font-size: 14.5px; font-weight: 700; }
        .toast-text-content p { color: var(--text-muted); font-size: 12px; }
    </style>
</head>
<body>

    <div class="premium-toast-panel" id="customGlassToast">
        <i id="toastIconBlock" class="fa-solid fa-circle-check"></i>
        <div class="toast-text-content">
            <h4 id="toastTitleBlock">Status update</h4>
            <p id="toastMessageBlock">Details</p>
        </div>
    </div>

    <div class="edit-deck-card">
        <div class="card-header-block">
            <div class="icon-shield-pulse"><i class="fa-solid fa-user-shield"></i></div>
            <h2>Request Profile Update</h2>
            <p>Modify parameters and submit to core validation deck</p>
        </div>

        <form class="form-scaffold" id="updateRequestForm" onsubmit="dispatchUpdateRequest(event)">
            <div class="input-group-wrapper">
                <label id="prnLabel">PRN / Student Key Identifier (Locked)</label>
                <div class="interactive-input-box">
                    <input type="text" id="studentPrn" placeholder="Fetching valid key..." maxlength="16">
                    <i class="fa-solid fa-fingerprint" id="prnIcon"></i>
                </div>
                <div class="error-hint-text" id="prnError">Security Mismatch: PRN must be exactly 16 characters.</div>
            </div>

            <div class="input-group-wrapper">
                <label>Full Name</label>
                <div class="interactive-input-box">
                    <input type="text" id="updateName" placeholder="Enter your full name">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>

            <div class="input-group-wrapper">
                <label>Email Address</label>
                <div class="interactive-input-box">
                    <input type="text" id="updateEmail" placeholder="student@gmail.com">
                    <i class="fa-solid fa-envelope"></i>
                </div>
            </div>

            <div class="input-group-wrapper">
                <label>Contact Number</label>
                <div class="interactive-input-box">
                    <input type="text" id="updatePhone" placeholder="+91 9XXXXXXXXX">
                    <i class="fa-solid fa-phone"></i>
                </div>
            </div>

            <div class="input-group-wrapper">
                <label>Date of Birth (DOB)</label>
                <div class="interactive-input-box">
                    <input type="date" id="updateDOB">
                    <i class="fa-solid fa-calendar-days"></i>
                </div>
            </div>

            <div class="input-group-wrapper">
                <label>Academic Year</label>
                <div class="interactive-input-box">
                    <select id="updateYear">
                        <option value="">Select Academic Year (Unchanged)</option>
                        <option value="1">First Year (FY)</option>
                        <option value="2">Second Year (SY)</option>
                        <option value="3">Third Year (TY)</option>
                        <option value="4">Final Year (BE/BTech)</option>
                    </select>
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
            </div>

            <div class="input-group-wrapper">
                <label>Request Hierarchy Rank</label>
                <div class="interactive-input-box">
                    <select id="updateRole">
                        <option value="">Select Role Rank (Unchanged)</option>
                        <option value="student">Student (Free Tier)</option>
                        <option value="silver">Silver User</option>
                        <option value="gold">Gold User</option>
                        <option value="diamond">Diamond Member</option>
                    </select>
                    <i class="fa-solid fa-crown"></i>
                </div>
            </div>

            <button type="submit" class="btn-submit-request" id="submitBtn">
                <span class="btn-text"><i class="fa-solid fa-paper-plane"></i> Push Data to Master Deck</span>
            </button>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCZhDPaVY7jv_hXtHdpVqUcGe1hwAxvZmc",
            authDomain: "students-e5183.firebaseapp.com",
            databaseURL: "https://students-e5183-default-rtdb.firebaseio.com",
            projectId: "students-e5183"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let detectedPrn = localStorage.getItem('userPRN') || localStorage.getItem('PRN') || localStorage.getItem('studentPRN') || localStorage.getItem('user_prn');
        const prnField = document.getElementById('studentPrn');

        if (detectedPrn && detectedPrn.trim() !== "") {
            applyLockedState(detectedPrn.trim());
            checkUserRoleAndLockFields(detectedPrn.trim());
        } else {
            prnField.placeholder = "Enter your 16-digit PRN Number";
            document.getElementById('prnLabel').innerText = "PRN / Student Key Identifier (Required Once)";
            prnField.style.borderColor = "rgba(255,255,255,0.15)";
            
            prnField.addEventListener('input', function() {
                if (this.value.trim().length === 16) {
                    const typedPrn = this.value.trim();
                    localStorage.setItem('userPRN', typedPrn);
                    triggerGlassNotification("Key Synced", "PRN Verification successfully locked.", "success");
                    applyLockedState(typedPrn);
                    checkUserRoleAndLockFields(typedPrn);
                }
            });
        }

        // 🛡️ User ka database status check karke Dropdown lock karne wala logic
        function checkUserRoleAndLockFields(prn) {
            database.ref('users/' + prn).once('value').then((snapshot) => {
                const userData = snapshot.val() || {};
                if (userData.role === 'master') {
                    const roleSelect = document.getElementById('updateRole');
                    roleSelect.setAttribute('disabled', true);
                    roleSelect.style.cursor = "not-allowed";
                    roleSelect.style.opacity = "0.6";
                    roleSelect.options[0].text = "Locked (Master Rank Active)";
                    triggerGlassNotification("Security Active", "Master privileges detected. Hierarchy restricted.", "success");
                }
            }).catch(err => console.error("Verification Fail:", err));
        }

        function applyLockedState(value) {
            prnField.value = value;
            prnField.setAttribute('readonly', true);
            prnField.style.opacity = "0.85";
            prnField.style.background = "rgba(56,189,248,0.03)";
            prnField.style.borderStyle = "dashed";
            prnField.style.borderColor = "var(--primary)";
            prnField.style.color = "var(--primary)";
            prnField.style.cursor = "not-allowed";
            document.getElementById('prnIcon').style.color = "var(--primary)";
            document.getElementById('prnLabel').innerText = "PRN / Student Key Identifier (Locked & Verified)";
        }

        function triggerGlassNotification(title, message, type) {
            const toast = document.getElementById('customGlassToast');
            const icon = document.getElementById('toastIconBlock');
            document.getElementById('toastTitleBlock').innerText = title;
            document.getElementById('toastMessageBlock').innerText = message;
            toast.className = (type === 'success') ? "premium-toast-panel toast-success-node active" : "premium-toast-panel toast-error-node active";
            icon.className = (type === 'success') ? "fa-solid fa-circle-check" : "fa-solid fa-triangle-exclamation";
            setTimeout(() => { toast.classList.remove('active'); }, 3500);
        }

        function dispatchUpdateRequest(event) {
            event.preventDefault();
            const prnInput = prnField.value.trim();
            const newName = document.getElementById('updateName').value.trim();
            const newEmail = document.getElementById('updateEmail').value.trim();
            const newPhone = document.getElementById('updatePhone').value.trim();
            const newDOB = document.getElementById('updateDOB').value;
            const newYear = document.getElementById('updateYear').value;
            const roleSelect = document.getElementById('updateRole');
            const newRole = roleSelect.value;

            document.getElementById('prnError').style.display = 'none';

            if (prnInput.length !== 16) {
                document.getElementById('prnError').style.display = 'block';
                triggerGlassNotification("Validation Error", "PRN key must be exactly 16 digits.", "error");
                return;
            }

            if(!newName && !newEmail && !newPhone && !newDOB && !newYear && !newRole) {
                triggerGlassNotification("No Changes", "Please modify at least one field.", "error");
                return;
            }

            database.ref('users/' + prnInput).once('value').then((snapshot) => {
                const userData = snapshot.val() || {};
                
                // Backend bypass protection
                let finalRoleSetting = newRole || userData.role || "student";
                if(userData.role === 'master') {
                    finalRoleSetting = "master"; 
                }

                database.ref('profile_requests/' + prnInput).set({
                    prn: prnInput,
                    oldName: userData.name || "Not Available",
                    newName: newName || userData.name || "Not Available",
                    oldEmail: userData.email || "Not Available",
                    newEmail: newEmail || userData.email || "Not Available",
                    oldPhone: userData.phone || "Not Available",
                    newPhone: newPhone || userData.phone || "Not Available",
                    oldDOB: userData.dob || "Not Set",
                    newDOB: newDOB || userData.dob || "Not Set",
                    oldYear: userData.year || "first_year",
                    newYear: newYear || userData.year || "first_year",
                    oldRole: userData.role || "student",
                    newRole: finalRoleSetting,
                    status: "pending"
                }).then(() => {
                    triggerGlassNotification("Sync Successful", "Data queued into Master Deck Stream!", "success");
                    document.getElementById('updateRequestForm').reset();
                    setTimeout(() => { window.location.href = "fy.html"; }, 2200);
                });
            }).catch(err => triggerGlassNotification("Node Error", err.message, "error"));
        }
    </script>
</body>
</html>
