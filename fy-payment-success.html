<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Successful — StudyBuddyZone</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg: #070b14;
      --card: #0e1420;
      --border: rgba(255,255,255,0.07);
      --text: #f0f4ff;
      --muted: #6b7a99;
      --silver: #94a3b8;
      --gold: #f59e0b;
      --diamond: #38bdf8;
      --accent: #6366f1;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow-x: hidden;
    }

    /* ── Particle canvas ── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* ── Checkmark ── */
    .check-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      margin-bottom: 4px;
    }
    .check-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2.5px solid var(--accent);
      opacity: 0;
      animation: ringPop 0.6s cubic-bezier(0.16,1,.3,1) 0.1s forwards;
    }
    .check-ring-outer {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1.5px solid rgba(99,102,241,0.3);
      opacity: 0;
      animation: ringPop 0.7s cubic-bezier(0.16,1,.3,1) 0.2s forwards;
    }
    .check-circle {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(99,102,241,0.5);
      transform: scale(0);
      animation: popIn 0.55s cubic-bezier(0.16,1,.3,1) forwards;
    }
    .check-circle svg {
      width: 44px; height: 44px;
      stroke: #fff;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawCheck 0.4s ease 0.4s forwards;
    }
    @keyframes popIn {
      0%   { transform: scale(0); opacity:0; }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1); opacity:1; }
    }
    @keyframes ringPop {
      0%   { transform: scale(0.6); opacity:0; }
      60%  { opacity:1; }
      100% { transform: scale(1.3); opacity:0; }
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    /* ── Heading ── */
    .heading {
      text-align: center;
      animation: fadeUp 0.5s ease 0.35s both;
    }
    .heading h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a5b4fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .heading p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Role badge ── */
    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 100px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      animation: fadeUp 0.5s ease 0.45s both;
    }
    .role-badge.silver {
      background: rgba(148,163,184,0.12);
      border: 1.5px solid rgba(148,163,184,0.35);
      color: var(--silver);
      box-shadow: 0 0 20px rgba(148,163,184,0.1);
    }
    .role-badge.gold {
      background: rgba(245,158,11,0.12);
      border: 1.5px solid rgba(245,158,11,0.35);
      color: var(--gold);
      box-shadow: 0 0 20px rgba(245,158,11,0.15);
    }
    .role-badge.diamond {
      background: rgba(56,189,248,0.12);
      border: 1.5px solid rgba(56,189,248,0.35);
      color: var(--diamond);
      box-shadow: 0 0 20px rgba(56,189,248,0.15);
    }

    /* ── Detail card ── */
    .detail-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      animation: fadeUp 0.5s ease 0.5s both;
    }
    .detail-card-header {
      padding: 14px 20px;
      background: rgba(99,102,241,0.08);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .detail-value { font-size: 13px; font-weight: 700; color: var(--text); text-align: right; max-width: 60%; word-break: break-all; }
    .detail-value.green { color: #34d399; }

    /* ── Success pill ── */
    .success-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.25);
      color: #34d399;
      font-size: 11px;
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 100px;
    }

    /* ── CTA button ── */
    .cta-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 8px 32px rgba(99,102,241,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: fadeUp 0.5s ease 0.6s both;
    }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(99,102,241,0.5); }

    .support-row {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      animation: fadeUp 0.5s ease 0.7s both;
    }
    .support-row a { color: #818cf8; font-weight: 600; text-decoration: none; }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(16px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed;
      width: 8px; height: 8px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity:1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity:0; }
    }
  </style>
</head>
<body>
<canvas id="particles"></canvas>

<div class="page">
  <div class="check-wrap">
    <div class="check-ring-outer"></div>
    <div class="check-ring"></div>
    <div class="check-circle">
      <svg viewBox="0 0 52 52"><polyline points="14,27 22,35 38,17"/></svg>
    </div>
  </div>

  <div class="heading">
    <h1>Payment Successful!</h1>
    <p>Tera account unlock ho gaya.<br/>Ab study shuru kar!</p>
  </div>

  <div class="role-badge" id="roleBadge">—</div>

  <div class="detail-card">
    <div class="detail-card-header">✦ Transaction Details</div>
    <div class="detail-row">
      <span class="detail-label">Status</span>
      <span class="detail-value"><span class="success-pill">✅ PAID</span></span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Membership</span>
      <span class="detail-value green" id="detRole">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">PRN</span>
      <span class="detail-value" id="detPRN">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Order ID</span>
      <span class="detail-value" id="detOrder" style="font-size:11px;color:var(--muted);">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Valid Until</span>
      <span class="detail-value green" id="detValidity">30 days</span>
    </div>
  </div>

  <a href="/index.html" class="cta-btn">📚 Study Zone खोलो</a>

  <div class="support-row">
    Problem hai? <a href="https://wa.me/919049321230?text=Payment%20help%20needed" target="_blank">WhatsApp Support</a>
  </div>
</div>

<script>
  // ── URL params ──
  const p       = new URLSearchParams(location.search);
  const prn     = p.get('prn')      || '—';
  const orderId = p.get('order_id') || '—';
  const role    = (p.get('role')    || 'silver').toLowerCase();

  const roleConfig = {
    silver:  { label: '🥈 SILVER',  cls: 'silver' },
    gold:    { label: '🥇 GOLD',    cls: 'gold'   },
    diamond: { label: '💎 DIAMOND', cls: 'diamond' }
  };
  const rc = roleConfig[role] || roleConfig.silver;

  document.getElementById('roleBadge').textContent = rc.label;
  document.getElementById('roleBadge').classList.add(rc.cls);
  document.getElementById('detRole').textContent   = rc.label;
  document.getElementById('detPRN').textContent    = prn;
  document.getElementById('detOrder').textContent  = orderId;

  // validity 30 days from now
  const until = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000);
  document.getElementById('detValidity').textContent =
    until.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });

  // ── Particles (subtle floating dots) ──
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');
  let W, H, dots = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 55; i++) {
    dots.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.5 + 0.4,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      a: Math.random() * 0.5 + 0.1
    });
  }

  (function animate() {
    ctx.clearRect(0, 0, W, H);
    dots.forEach(d => {
      d.x += d.vx; d.y += d.vy;
      if (d.x < 0) d.x = W; if (d.x > W) d.x = 0;
      if (d.y < 0) d.y = H; if (d.y > H) d.y = 0;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(99,102,241,${d.a})`;
      ctx.fill();
    });
    requestAnimationFrame(animate);
  })();

  // ── Confetti burst ──
  const colors = ['#6366f1','#8b5cf6','#f59e0b','#34d399','#38bdf8','#f472b6'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      top: 0;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${Math.random() * 8 + 5}px;
      height: ${Math.random() * 8 + 5}px;
      animation-duration: ${Math.random() * 2 + 2}s;
      animation-delay: ${Math.random() * 0.8}s;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
</script>
</body>
</html>
