<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — StudyBuddy Pro</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .icon { font-size: 72px; margin-bottom: 16px; }
    h1 { color: #10b981; font-size: 24px; margin-bottom: 8px; }
    p { color: #6b7280; font-size: 15px; margin-bottom: 6px; }
    .branch-badge {
      display: inline-block;
      background: linear-gradient(135deg, #7c4dff, #e040fb);
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 16px;
      margin: 16px 0;
      text-transform: uppercase;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 24px;
      text-decoration: none;
    }
    .order-id { font-size: 11px; color: #9ca3af; margin-top: 12px; }
  </style>
  <script src="devtools-guard.js"></script>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Payment Successful!</h1>
    <p>तुमची branch automatically unlock झाली आहे!</p>
    <div class="branch-badge" id="branchBadge">—</div>
    <p style="color:#10b981; font-weight:700;">✅ Branch Unlocked!</p>
    <p id="prnText" style="margin-top:8px;"></p>
    <a href="/second-year.html" class="btn">📚 Study करा आता!</a>
    <div class="order-id" id="orderIdText"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const branch = params.get('branch') || '';
    const prn = params.get('prn') || '';
    const orderId = params.get('order_id') || '';

    document.getElementById('branchBadge').textContent = branch.toUpperCase();
    document.getElementById('prnText').textContent = 'PRN: ' + prn;
    document.getElementById('orderIdText').textContent = 'Order ID: ' + orderId;
  </script>
</body>
</html>
