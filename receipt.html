<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study Zone | Receipt Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#f0f4ff;
    --white:#ffffff;
    --accent:#4f46e5;
    --accent2:#7c3aed;
    --text:#1e293b;
    --muted:#64748b;
    --border:#e2e8f0;
    --green:#16a34a;
    --gold:#d97706;
    --silver:#64748b;
    --diamond:#0891b2;
  }
  body{
    font-family:'Poppins',sans-serif;
    background:var(--bg);
    min-height:100vh;
    padding:32px 16px;
  }

  /* Search Section */
  .search-wrap{
    max-width:480px;margin:0 auto 32px;
    background:var(--white);border-radius:20px;
    padding:28px;box-shadow:0 4px 24px rgba(79,70,229,0.10);
  }
  .search-title{
    font-family:'Nunito',sans-serif;font-weight:900;
    font-size:22px;color:var(--accent);text-align:center;
    margin-bottom:4px;
  }
  .search-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px;}
  .inp{
    width:100%;padding:12px 16px;
    border:1.5px solid var(--border);border-radius:10px;
    font-family:'Poppins',sans-serif;font-size:14px;color:var(--text);
    outline:none;margin-bottom:12px;transition:border 0.2s;
  }
  .inp:focus{border-color:var(--accent);}
  .fetch-btn{
    width:100%;padding:13px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;border:none;border-radius:10px;
    font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;
    cursor:pointer;transition:opacity 0.2s;
  }
  .fetch-btn:hover{opacity:0.9;}
  .fetch-btn:disabled{opacity:0.5;cursor:not-allowed;}

  .error-box{
    background:#fef2f2;border:1px solid #fca5a5;
    border-radius:8px;padding:12px;font-size:13px;
    color:#dc2626;margin-top:12px;text-align:center;display:none;
  }
  .info-note{
    background:#eff6ff;border:1px solid #bfdbfe;
    border-radius:8px;padding:10px 12px;font-size:12px;
    color:#1e40af;margin-bottom:12px;text-align:center;
  }

  /* Receipt */
  .receipt-wrap{
    max-width:600px;margin:0 auto;display:none;
  }
  .download-bar{
    display:flex;gap:12px;margin-bottom:16px;justify-content:flex-end;
  }
  .dl-btn{
    padding:10px 20px;border-radius:10px;border:none;
    font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;
    cursor:pointer;transition:all 0.2s;
  }
  .dl-print{background:var(--accent);color:#fff;}
  .dl-print:hover{opacity:0.88;}
  .dl-back{background:var(--white);color:var(--muted);border:1px solid var(--border);}
  .dl-back:hover{border-color:var(--accent);color:var(--accent);}

  /* Receipt card */
  .receipt{
    background:var(--white);
    border-radius:20px;
    box-shadow:0 8px 40px rgba(79,70,229,0.12);
    overflow:hidden;
    font-family:'Poppins',sans-serif;
  }

  /* Header stripe */
  .receipt-header{
    background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 50%,#0891b2 100%);
    padding:32px 36px 24px;
    color:#fff;
    position:relative;
    overflow:hidden;
  }
  .receipt-header::before{
    content:'';position:absolute;top:-40px;right:-40px;
    width:180px;height:180px;border-radius:50%;
    background:rgba(255,255,255,0.08);
  }
  .receipt-header::after{
    content:'';position:absolute;bottom:-60px;right:60px;
    width:120px;height:120px;border-radius:50%;
    background:rgba(255,255,255,0.06);
  }
  .rh-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .brand{
    font-family:'Nunito',sans-serif;font-weight:900;font-size:24px;
    letter-spacing:-0.5px;
  }
  .brand span{opacity:0.75;font-size:14px;font-weight:600;display:block;margin-top:2px;letter-spacing:0;}
  .receipt-badge{
    background:rgba(255,255,255,0.2);
    border:1px solid rgba(255,255,255,0.3);
    padding:6px 14px;border-radius:20px;
    font-size:11px;font-weight:700;letter-spacing:1px;
    backdrop-filter:blur(4px);
  }
  .receipt-title{
    font-family:'Nunito',sans-serif;font-weight:900;
    font-size:32px;margin-top:20px;letter-spacing:-1px;
    opacity:0.95;
  }
  .receipt-num{font-size:13px;opacity:0.7;margin-top:4px;letter-spacing:0.5px;}

  /* Body */
  .receipt-body{padding:32px 36px;}

  .info-grid{
    display:grid;grid-template-columns:1fr 1fr;
    gap:20px;margin-bottom:28px;
  }
  .info-block{}
  .info-label{
    font-size:11px;font-weight:700;letter-spacing:1px;
    text-transform:uppercase;color:var(--muted);margin-bottom:4px;
  }
  .info-value{font-size:15px;font-weight:600;color:var(--text);}
  .info-value.highlight{color:var(--accent);}

  /* Tier display */
  .tier-section{
    border:2px solid var(--border);border-radius:14px;
    padding:20px 24px;margin-bottom:24px;
    display:flex;align-items:center;gap:16px;
  }
  .tier-icon-big{font-size:40px;}
  .tier-details{flex:1;}
  .tier-name-big{
    font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;
  }
  .tier-desc-small{font-size:12px;color:var(--muted);margin-top:3px;}
  .tier-amount{
    font-family:'Nunito',sans-serif;font-weight:900;
    font-size:28px;text-align:right;
  }

  /* Silver */
  .t-silver .tier-section{border-color:#cbd5e1;background:#f8fafc;}
  .t-silver .tier-name-big{color:var(--silver);}
  .t-silver .tier-amount{color:var(--silver);}
  /* Gold */
  .t-gold .tier-section{border-color:#fcd34d;background:#fffbeb;}
  .t-gold .tier-name-big{color:var(--gold);}
  .t-gold .tier-amount{color:var(--gold);}
  /* Diamond */
  .t-diamond .tier-section{border-color:#a5f3fc;background:#ecfeff;}
  .t-diamond .tier-name-big{color:var(--diamond);}
  .t-diamond .tier-amount{color:var(--diamond);}

  /* Features list */
  .features{margin-bottom:24px;}
  .features-title{font-size:12px;font-weight:700;letter-spacing:0.5px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
  .feature-item{
    display:flex;align-items:center;gap:8px;
    font-size:13px;color:var(--text);padding:6px 0;
    border-bottom:1px solid #f1f5f9;
  }
  .feature-item:last-child{border-bottom:none;}
  .check{color:var(--green);font-size:15px;}

  /* Status */
  .status-section{
    display:flex;align-items:center;gap:12px;
    background:#f0fdf4;border:1.5px solid #86efac;
    border-radius:12px;padding:16px 20px;margin-bottom:24px;
  }
  .status-icon-big{font-size:28px;}
  .status-text-main{font-weight:700;font-size:15px;color:var(--green);}
  .status-text-sub{font-size:12px;color:var(--muted);margin-top:2px;}

  /* Divider */
  .dashed-divider{
    border:none;border-top:2px dashed var(--border);
    margin:24px 0;
  }

  /* Footer */
  .receipt-footer{
    background:#f8fafc;border-top:1px solid var(--border);
    padding:20px 36px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .footer-brand{font-weight:700;font-size:14px;color:var(--accent);}
  .footer-note{font-size:11px;color:var(--muted);text-align:right;}

  /* Watermark */
  .watermark{
    position:absolute;
    font-family:'Nunito',sans-serif;font-weight:900;
    font-size:80px;color:rgba(79,70,229,0.04);
    pointer-events:none;
    top:50%;left:50%;
    transform:translate(-50%,-50%) rotate(-30deg);
    white-space:nowrap;
    z-index:0;
  }

  /* QR placeholder */
  .qr-box{
    width:80px;height:80px;
    border:2px solid var(--border);border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:10px;color:var(--muted);text-align:center;
    flex-direction:column;gap:2px;
  }
  .qr-icon{font-size:28px;}

  .spinner{
    width:18px;height:18px;border:3px solid rgba(255,255,255,0.4);
    border-top-color:#fff;border-radius:50%;
    animation:spin 0.7s linear infinite;
    display:inline-block;vertical-align:middle;margin-right:8px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  @media print{
    body{padding:0;background:#fff;}
    .search-wrap,.download-bar{display:none!important;}
    .receipt-wrap{display:block!important;max-width:100%;}
    .receipt{border-radius:0;box-shadow:none;}
    .receipt-header{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .tier-section,.status-section,.progress-bar,.progress-fill{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    @page{margin:0.5cm;size:A4;}
  }
</style>
</head>
<body>

<!-- Search -->
<div class="search-wrap" id="searchWrap">
  <div class="search-title">📄 Receipt Generator</div>
  <div class="search-sub">Study Zone Premium — Official Payment Receipt</div>

  <div class="info-note">Enter your 16-digit PRN Number or Email ID to generate your official receipt.<br/><strong>Receipt available only after admin approval.</strong></div>

  <label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:6px;">PRN Number</label>
  <input class="inp" id="searchPRN" placeholder="Enter 16-digit PRN number" maxlength="16" inputmode="numeric" onkeydown="if(event.key==='Enter')fetchReceipt()" oninput="this.value=this.value.replace(/[^0-9]/g,'')"/>
  <div id="prnHint" style="font-size:11px;color:#94a3b8;margin-top:-8px;margin-bottom:10px;">PRN must be exactly 16 digits</div>

  <label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:6px;">— OR —</label>

  <label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:6px;">Email ID</label>
  <input class="inp" id="searchEmail" type="email" placeholder="Enter your email ID" onkeydown="if(event.key==='Enter')fetchReceipt()"/>

  <button class="fetch-btn" id="fetchBtn" onclick="fetchReceipt()">
    Generate Receipt
  </button>
  <div class="error-box" id="errorBox"></div>
</div>

<!-- Receipt -->
<div class="receipt-wrap" id="receiptWrap">
  <div class="download-bar">
    <button class="dl-btn dl-back" onclick="goBack()">← Back</button>
    <button class="dl-btn dl-print" onclick="window.print()">🖨️ Print / Save PDF</button>
  </div>
  <div class="receipt" id="receipt"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, doc, getDoc, query, where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCZhDPaVY7jv_hXtHdpVqUcGe1hwAxvZmc",
  authDomain: "students-e5183.firebaseapp.com",
  databaseURL: "https://students-e5183-default-rtdb.firebaseio.com",
  projectId: "students-e5183",
  storageBucket: "students-e5183.firebasestorage.app",
  messagingSenderId: "473442117683",
  appId: "1:473442117683:web:f39adc0665317aa95e9b46",
  measurementId: "G-DT4XQLZJW3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const TIER_INFO = {
  silver: {
    icon: '🥈', name: 'SILVER TIER', color: 't-silver',
    features: ['Handwritten Notes', 'Previous Year Questions (PYQs)', 'Solo MCQ Practice'],
    price: 20
  },
  gold: {
    icon: '🥇', name: 'GOLD TIER', color: 't-gold',
    features: ['All Silver features', 'Battle Arena Access', 'Competitive Zone','Questions bank', 'Exclusive Content'],
    price: 50
  },
  diamond: {
    icon: '💎', name: 'DIAMOND ALL-ACCESS', color: 't-diamond',
    features: ['All Gold features', 'Full Platform Access', 'All Layout Resources', 'Priority Support', 'Lifetime Updates'],
    price: 100
  }
};

window.fetchReceipt = async function() {
  const prnInput   = document.getElementById('searchPRN').value.trim();
  const emailInput = document.getElementById('searchEmail').value.trim();

  // PRN validation — exactly 16 digits
  if (prnInput && !/^[0-9]{16}$/.test(prnInput)) {
    showError('❌ PRN Number must be exactly 16 digits (numbers only).');
    return;
  }

  if (!prnInput && !emailInput) {
    showError('Please enter your PRN Number or Email ID.');
    return;
  }

  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Fetching...';
  hideError();

  try {
    let data = null;
    let displayPRN   = prnInput  || '—';
    let displayEmail = emailInput || '—';

    // Search by PRN first (document ID = PRN)
    if (prnInput) {
      const docSnap = await getDoc(doc(db, 'payments', prnInput));
      if (docSnap.exists()) {
        data = docSnap.data();
        displayPRN   = data.prn   || prnInput;
        displayEmail = data.email || emailInput || '—';
      }
    }

    // If not found by PRN, search payments by email field
    if (!data && emailInput) {
      const q = query(collection(db, 'payments'), where('email', '==', emailInput.toLowerCase()));
      const snap = await getDocs(q);
      if (!snap.empty) {
        data = snap.docs[0].data();
        displayPRN   = data.prn   || prnInput  || '—';
        displayEmail = data.email || emailInput;
      }
    }

    // Fallback: also check requests collection by PRN or email
    if (!data) {
      if (prnInput) {
        const q = query(collection(db, 'requests'), where('prn', '==', prnInput));
        const snap = await getDocs(q);
        if (!snap.empty) {
          data = snap.docs[0].data();
          displayPRN   = data.prn   || prnInput;
          displayEmail = data.email || emailInput || '—';
        }
      }
      if (!data && emailInput) {
        const q = query(collection(db, 'requests'), where('email', '==', emailInput.toLowerCase()));
        const snap = await getDocs(q);
        if (!snap.empty) {
          data = snap.docs[0].data();
          displayPRN   = data.prn   || prnInput  || '—';
          displayEmail = data.email || emailInput;
        }
      }
    }

    if (!data) {
      showError('❌ No payment record found. Please check your PRN or Email and try again.');
      btn.disabled = false;
      btn.innerHTML = 'Generate Receipt';
      return;
    }

    if (!data.unlocked || data.status !== 'approved') {
      const st = (data.status || 'pending').toUpperCase();
      const msg = st === 'PENDING'
        ? '⏳ Your payment is still PENDING approval. PDF will be available once admin approves.'
        : st === 'REJECTED'
        ? '❌ Your payment was REJECTED. Please contact admin.'
        : `Payment status: "${st}". Receipt available only after admin approval.`;
      showError(msg);
      btn.disabled = false;
      btn.innerHTML = 'Generate Receipt';
      return;
    }

    renderReceipt(data, displayPRN, displayEmail);
    document.getElementById('searchWrap').style.display = 'none';
    document.getElementById('receiptWrap').style.display = 'block';

  } catch(e) {
    showError('Error fetching data: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = 'Generate Receipt';
  }
};

function renderReceipt(data, displayPRN, displayEmail) {
  const tier = data.tier || 'silver';
  const info = TIER_INFO[tier] || TIER_INFO.silver;
  const receiptNo = 'SZ-' + (data.requestId || Date.now()).toString().slice(-8).toUpperCase();
  const date = data.approvedAt
    ? new Date(data.approvedAt).toLocaleDateString('en-IN', {day:'2-digit',month:'long',year:'numeric'})
    : new Date().toLocaleDateString('en-IN', {day:'2-digit',month:'long',year:'numeric'});
  const time = data.approvedAt
    ? new Date(data.approvedAt).toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'})
    : '—';

  document.getElementById('receipt').className = `receipt ${info.color}`;
  document.getElementById('receipt').innerHTML = `
    <div class="receipt-header">
      <div class="rh-top">
        <div>
          <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:36px;letter-spacing:2px;text-transform:uppercase;line-height:1;">STUDY ZONE</div>
          <div style="font-size:12px;font-weight:600;opacity:0.8;letter-spacing:3px;text-transform:uppercase;margin-top:3px;">Premium Academic Hub</div>
          <div style="font-size:11px;opacity:0.6;margin-top:2px;">Official Payment Receipt Issuing Authority</div>
        </div>
        <div style="text-align:right;">
          <div class="receipt-badge" style="margin-bottom:8px;">OFFICIAL RECEIPT</div>
          <div style="font-size:10px;opacity:0.65;letter-spacing:0.5px;">studyzone.official</div>
        </div>
      </div>
      <div style="border-top:1px solid rgba(255,255,255,0.2);margin:16px 0 14px;"></div>
      <div class="receipt-title" style="font-size:22px;letter-spacing:1px;text-transform:uppercase;opacity:0.9;">Payment Receipt</div>
      <div class="receipt-num">Receipt No: ${receiptNo} &nbsp;|&nbsp; Date: ${date}</div>
    </div>

    <div class="receipt-body" style="position:relative;">
      <div class="watermark">PAID</div>

      <div class="info-grid">
        <div class="info-block">
          <div class="info-label">Student Name</div>
          <div class="info-value">${data.name || '—'}</div>
        </div>
        <div class="info-block">
          <div class="info-label">PRN Number</div>
          <div class="info-value highlight">${displayPRN}</div>
        </div>
        <div class="info-block">
          <div class="info-label">Email ID</div>
          <div class="info-value highlight">${displayEmail}</div>
        </div>
        <div class="info-block">
          <div class="info-label">Payment Date</div>
          <div class="info-value">${date}</div>
        </div>
        <div class="info-block">
          <div class="info-label">Approval Time</div>
          <div class="info-value">${time}</div>
        </div>
        <div class="info-block">
          <div class="info-label">Request ID</div>
          <div class="info-value" style="font-size:12px;">${data.requestId || '—'}</div>
        </div>
      </div>

      <div class="tier-section">
        <div class="tier-icon-big">${info.icon}</div>
        <div class="tier-details">
          <div class="tier-name-big">${info.name}</div>
          <div class="tier-desc-small">Premium Membership — Study Zone</div>
        </div>
        <div class="tier-amount">₹${data.totalPaid || info.price}</div>
      </div>

      <div class="features">
        <div class="features-title">Included Features</div>
        ${info.features.map(f => `
          <div class="feature-item">
            <span class="check">✓</span>
            <span>${f}</span>
          </div>
        `).join('')}
      </div>

      <div class="status-section">
        <div class="status-icon-big">✅</div>
        <div>
          <div class="status-text-main">Payment Verified &amp; Approved</div>
          <div class="status-text-sub">Your ${info.name} is active. Account unlocked by admin.</div>
        </div>
      </div>

      <hr class="dashed-divider"/>

      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Amount Paid</div>
          <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:32px;color:var(--accent);">
            ₹${data.totalPaid || info.price}
          </div>
          <div style="font-size:11px;color:var(--muted);">via UPI • 9049321230@ptyes</div>
        </div>
        <div class="qr-box">
          <div class="qr-icon">🔐</div>
          <div>Verified</div>
        </div>
      </div>

      <div style="margin-top:20px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px 18px;">
        <div style="font-size:11px;font-weight:700;color:#475569;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;">📋 Important Notice</div>
        <div style="font-size:11px;color:var(--muted);line-height:1.8;">
          This is an <strong>official payment receipt</strong> issued by <strong>STUDY ZONE Premium Academic Hub</strong>.
          This document confirms that your payment has been verified, processed, and your premium membership is active.<br/>
          Receipt No. <strong>${receiptNo}</strong> is unique to this transaction. Keep this for your records.<br/>
          For support or queries, contact us with your PRN or registered email.
        </div>
      </div>
    </div>

    <div class="receipt-footer">
      <div>
        <div class="footer-brand" style="font-size:16px;letter-spacing:1px;">STUDY ZONE</div>
        <div style="font-size:10px;color:#94a3b8;margin-top:2px;">Premium Academic Hub — Official Document</div>
        <div style="font-size:10px;color:#94a3b8;margin-top:1px;">This is a computer-generated receipt and is valid without signature.</div>
      </div>
      <div class="footer-note">
        Generated: ${new Date().toLocaleDateString('en-IN')}<br/>
        Receipt No: ${receiptNo}<br/>
        <span style="color:#6366f1;font-weight:700;">✔ Verified &amp; Authenticated</span>
      </div>
    </div>
  `;
}

window.goBack = function() {
  document.getElementById('receiptWrap').style.display = 'none';
  document.getElementById('searchWrap').style.display = 'block';
  document.getElementById('fetchBtn').disabled = false;
  document.getElementById('fetchBtn').innerHTML = 'Generate Receipt';
};

function showError(msg) {
  const e = document.getElementById('errorBox');
  e.textContent = msg;
  e.style.display = 'block';
}
function hideError() {
  document.getElementById('errorBox').style.display = 'none';
}
</script>
</body>
</html>
